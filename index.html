
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pandas (DataFrames) console</title>
  <link href="./styles.css" rel="stylesheet" />

</head>

<body>

  <h1>Pandas (DataFrames) console</h1>

  <form name="editor">
      <table>
        <tbody>
          <tr>
            <td id="buttons">
              <div>
<h2>Import modules</h2>

<p>
  <input type="button" class="btn btn-module" value="pandas" onclick="document.editor.textbox.value+='\nimport pandas as pd'" />
  <input type="button" class="btn btn-module" value="numpy" onclick="document.editor.textbox.value+='\nimport numpy as np'" />
  <input type="button" class="btn btn-module" value="matplotlib" onclick="document.editor.textbox.value+='\nimport matplotlib.pyplot as plt\n%matplotlib inline'" />
  <input type="button" class="btn btn-module" value="version" onclick="document.editor.textbox.value+='\nprint(np.__version__)'" />
</p>

<hr />
<h2>pandas.DataFrame object</h2>

<p>
  <input type="button" class="btn btn-success" value="pd.DataFrame" onclick="dataFrame();" />
  <input class="btn" name="array" id="array" placeholder="array" size="10" type="textfield" />
  <input class="btn" name="variable" id="variable" placeholder="variable name" size="10" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-success" value="create from object" onclick="createFromObject();" />
  <input type="button" class="btn btn-success" value="create from list" onclick="createFromList();" />
  <input type="button" class="btn btn-success" value="create from series" onclick="createFromSeries();" />
</p>

<p>
  <input type="button" class="btn btn-success" value="columns" onclick="seriesProperties(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="copy" onclick="copy(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="index" onclick="seriesProperties(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="name" onclick="nameSeries(this.value);" />
  <input class="btn" name="value" id="value" placeholder="value" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-success" value="values" onclick="seriesProperties(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="access" onclick="access();" />
  <input class="btn" name="index" id="index" placeholder="index" type="number" />
</p>

<p>
  <input type="button" class="btn btn-success" value="range" onclick="range();" />
</p>

<p>
  <input class="btn" name="start" id="start" placeholder="start" type="number" />
  <input class="btn" name="end" id="end" placeholder="end" type="number" />
  <input class="btn" name="step" id="step" placeholder="step" type="number" />
</p>

<p>
  <input type="button" class="btn btn-success" value="sort" onclick="statistics(this.value);" />
</p>

<hr />
<h2>Data at a glance</h2>

<p>
  <input type="button" class="btn btn-data" value="describe()" onclick="data(this.value);" />
  <input type="button" class="btn btn-data" value="dtypes" onclick="data(this.value);" />
  <input type="button" class="btn btn-data" value="dtypes.value_counts()" onclick="data(this.value);" />
  <input type="button" class="btn btn-data" value="head()" onclick="data(this.value);" />
  <input type="button" class="btn btn-data" value="info()" onclick="data(this.value);" />
  <input type="button" class="btn btn-data" value="shape" onclick="data(this.value);" />
  <input type="button" class="btn btn-data" value="size" onclick="data(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-data" value="assign column" onclick="assignColumn();" />
  <input class="btn" name="assignDataColumn" id="assignDataColumn" placeholder="column" type="textfield" />
  <input class="btn" name="assignDataVariable" id="assignDataVariable" placeholder="new variable" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-data" value="average" onclick="dataStat(this.value);" />
  <input type="button" class="btn btn-data" value="min()" onclick="dataStat(this.value);" />
  <input type="button" class="btn btn-data" value="max()" onclick="dataStat(this.value);" />
  <input type="button" class="btn btn-data" value="mean()" onclick="dataStat(this.value);" />
  <input type="button" class="btn btn-data" value="median()" onclick="dataStat(this.value);" />
  <input type="button" class="btn btn-data" value="quantile(.25)" onclick="dataStat(this.value);" />
  <input type="button" class="btn btn-data" value="quantile([.2, .4, .6, .8, 1])" onclick="dataStat(this.value);" />
  <input type="button" class="btn btn-data" value="std()" onclick="dataStat(this.value);" />
  <input type="button" class="btn btn-data" value="sum()" onclick="dataStat(this.value);" />
</p>

<hr />
<h2>Array Type</h2>

<p>
  <input type="button" class="btn btn-success" value="dtype" onclick="dtype();" />
  <input type="button" class="btn btn-success" value="dtype.value_counts()" onclick="dtype(this.value);" />
  <input type="button" class="btn btn-success" value="float" onclick="dtype(this.value);" />
</p>

<hr />
<h2>Assigning</h2>

<p>
  <input type="button" class="btn btn-primary" value="assign element" onclick="assignSeries();" />
</p>

<p>
  <input class="btn" name="assignIndexValue" id="assignIndexValue" placeholder="index" type="textfield" />
  <input class="btn" name="assignValue" id="assignValue" placeholder="value" type="number" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="assign range" onclick="assignRangeSeries();" />
  <input class="btn" name="assignRangeStart" id="assignRangeStart" placeholder="start" type="number" />
  <input class="btn" name="assignRangeEnd" id="assignRangeEnd" placeholder="end" type="number" />
</p>

<hr />
<h2>Indexing</h2>

<p>
  <input type="button" class="btn btn-primary" value="column" onclick="accessDataFrameColumn();" />
  <input class="btn" name="indexDataFrameColumn" id="indexDataFrameColumn" placeholder="column" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="to_frame()" onclick="document.editor.textbox.value+='.' + this.value" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="row" onclick="accessDataFrameRow();" />
</p>

<p>
  <input class="btn" name="indexDataFrameRow" id="indexDataFrameRow" placeholder="row" type="textfield" />
  <input class="btn" name="indexDataFrameRowSecond" id="indexDataFrameRowSecond" placeholder="second argument" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="iloc index" onclick="accessIloc(this.value);" />
</p>

<p>
  <input class="btn" name="ilocIndexStart" id="ilocIndexStart" placeholder="start" type="number" />
  <input class="btn" name="ilocIndexEnd" id="ilocIndexEnd" placeholder="end" type="number" />
  <input class="btn" name="ilocIndexStep" id="ilocIndexStep" placeholder="step" type="number" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="iloc range" onclick="ilocRange();" />
</p>

<p>
  <input class="btn" name="ilocIndexRangeStart" id="ilocIndexRangeStart" placeholder="range start" type="number" />
</p>

              </div>
    
            </td>
            <td id="textbox">
              <textarea id="preview" name="textbox"></textarea>
            </td>
            <td id="empty">
            </td>
          </tr>
        </tbody>
      </table>
  </form>

  <script src="./script.js"></script>

</body>
</html>
