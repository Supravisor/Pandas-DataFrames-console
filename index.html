
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pandas (DataFrames) console</title>
  <link href="./styles.css" rel="stylesheet" />

</head>

<body>

  <h1>Pandas (DataFrames) console</h1>

  <form name="editor">
      <table>
        <tbody>
          <tr>
            <td id="buttons">
              <div>
<h2>Import modules</h2>

<p>
  <input type="button" class="btn btn-module" value="pandas" onclick="document.editor.textbox.value+='\nimport pandas as pd'" />
  <input type="button" class="btn btn-module" value="numpy" onclick="document.editor.textbox.value+='\nimport numpy as np'" />
  <input type="button" class="btn btn-module" value="matplotlib" onclick="document.editor.textbox.value+='\nimport matplotlib.pyplot as plt\n%matplotlib inline'" />
  <input type="button" class="btn btn-module" value="version" onclick="document.editor.textbox.value+='\nprint(np.__version__)'" />
</p>

<hr />
<h2>pandas.DataFrame object</h2>

<p>
  <input type="button" class="btn btn-success" value="pd.DataFrame" onclick="dataFrame();" />
</p>

              </div>
    
            </td>
            <td id="textbox">
              <textarea id="preview" name="textbox"></textarea>
            </td>
            <td id="empty">
            </td>
          </tr>
        </tbody>
      </table>
  </form>

  <script src="./script.js"></script>

</body>
</html>
